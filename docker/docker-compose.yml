services:

  # ---- SCRUM Poker application ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      APP_ENV: development
      DATA_BACKEND: inmemory
      SECRET_KEY: dev-docker-secret-change-me
      FLASK_DEBUG: "1"
    volumes:
      # Mount source for live reload during development
      - ../app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

  # ---- PostgreSQL (optional — only required when DATA_BACKEND=postgres) ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scrum_poker
      POSTGRES_USER: poker_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker_user -d scrum_poker"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
