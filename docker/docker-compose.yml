services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrumm
      POSTGRES_PASSWORD: scrumm
      POSTGRES_DB: scrummdidliumcious
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrumm -d scrummdidliumcious"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
